name: Typst Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v3
        with:
          version: 'latest'

      - name: Compile demo document
        run: typst compile exemplo/ufsm-thesis.typ --root .

      - name: Compile test — tese
        run: typst compile tests/tese.typ --root .

      - name: Compile test — dissertacao
        run: typst compile tests/dissertacao.typ --root .

      - name: Compile test — tcc-graduacao
        run: typst compile tests/tcc-graduacao.typ --root .

      - name: Compile test — tcc-especializacao
        run: typst compile tests/tcc-especializacao.typ --root .

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: exemplo/ufsm-thesis.pdf

      - name: Update latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: |
            PDF compilado automaticamente da branch main.
            
            Este é um build automático do template. O PDF é gerado a cada commit na branch principal.
          files: exemplo/ufsm-thesis.pdf
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
